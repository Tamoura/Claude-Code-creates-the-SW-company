name: StudyFlow CI

on:
  push:
    branches: [main]
    paths:
      - 'products/studyflow/**'
      - '.github/workflows/studyflow-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'products/studyflow/**'
      - '.github/workflows/studyflow-ci.yml'

env:
  NODE_VERSION: '20'

jobs:
  api-lint-and-typecheck:
    name: API - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/studyflow/apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec tsc --noEmit
      - run: pnpm run lint

  api-test:
    name: API - Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/studyflow/apps/api
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: studyflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/studyflow_test
      # The jest setup (tests/helpers/env.ts) forces tests onto the test DB via
      # TEST_DATABASE_URL; CI must provide it with the container's credentials,
      # otherwise it falls back to a passwordless `postgres` URL and auth fails.
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/studyflow_test
      SESSION_SECRET: ci-test-session-secret-not-for-production-0123456789
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm exec prisma migrate deploy
      - name: Run tests with coverage
        run: |
          if pnpm exec jest --listTests >/dev/null 2>&1 && [ -n "$(pnpm exec jest --listTests 2>/dev/null)" ]; then
            pnpm test --coverage --coverageThreshold='{"global":{"branches":70,"functions":75,"lines":80,"statements":80}}'
          else
            echo "No tests yet (Foundation scaffold) — skipping until Backend adds them."
          fi

  web-build:
    name: Web - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/studyflow/apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5017
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - products/studyflow/apps/api
          - products/studyflow/apps/web
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run security audit
        run: pnpm audit --audit-level=critical --prod

  quality-gate:
    name: Quality Gate
    needs: [api-lint-and-typecheck, api-test, web-build, security]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify core jobs succeeded
        run: |
          echo "Job results:"
          echo "  api-lint-and-typecheck: ${{ needs.api-lint-and-typecheck.result }}"
          echo "  api-test:               ${{ needs.api-test.result }}"
          echo "  web-build:              ${{ needs.web-build.result }}"
          echo "  security:               ${{ needs.security.result }}"
          if [ "${{ needs.api-lint-and-typecheck.result }}" != "success" ] || \
             [ "${{ needs.api-test.result }}" != "success" ] || \
             [ "${{ needs.web-build.result }}" != "success" ]; then
            echo "Quality gate FAILED: one or more core jobs did not succeed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" != "success" ] && \
             [ "${{ needs.security.result }}" != "skipped" ]; then
            echo "::error::Security gate FAILED - fix vulnerabilities before merging"
            exit 1
          fi
          echo "All quality gates passed for studyflow"
