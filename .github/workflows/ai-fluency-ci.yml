name: AI Fluency CI

on:
  push:
    branches: [main, 'claude/**', 'feature/ai-fluency/**', 'fix/ai-fluency/**']
    paths:
      - 'products/ai-fluency/**'
      - '.github/workflows/ai-fluency-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'products/ai-fluency/**'
      - '.github/workflows/ai-fluency-ci.yml'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: api
            path: products/ai-fluency/apps/api
            needs-prisma: true
          - name: web
            path: products/ai-fluency/apps/web
            needs-prisma: false
    defaults:
      run:
        working-directory: ${{ matrix.app.path }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if app exists
        id: check
        run: |
          if [ -f "${{ matrix.app.path }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.app.name }} app not found on this branch — skipping"
          fi
        working-directory: .

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Generate Prisma client
        if: steps.check.outputs.exists == 'true' && matrix.app.needs-prisma
        run: pnpm exec prisma generate

      - name: Run lint
        if: steps.check.outputs.exists == 'true'
        run: pnpm run lint

      - name: Run type check
        if: steps.check.outputs.exists == 'true'
        run: pnpm run typecheck

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: always()
    defaults:
      run:
        working-directory: products/ai-fluency/apps/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ai_fluency_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_fluency_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-min-32-chars-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-different-min-32
      INTERNAL_API_KEY: test-internal-api-key-for-ci
      NODE_ENV: test
      PORT: 5014
    steps:
      - uses: actions/checkout@v4

      - name: Check if API app exists
        id: check
        run: |
          if [ -f "products/ai-fluency/apps/api/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::API app not found on this branch — skipping"
          fi
        working-directory: .

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build native dependencies
        if: steps.check.outputs.exists == 'true'
        run: pnpm rebuild argon2
        working-directory: .

      - name: Generate Prisma client
        if: steps.check.outputs.exists == 'true'
        run: pnpm exec prisma generate

      - name: Push schema to test database
        if: steps.check.outputs.exists == 'true'
        run: pnpm exec prisma db push --force-reset

      - name: Run tests with coverage
        if: steps.check.outputs.exists == 'true'
        run: pnpm test -- --coverage --runInBand

      - name: Upload coverage report
        if: always() && steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage
          path: products/ai-fluency/apps/api/coverage/
          retention-days: 7

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: always()
    defaults:
      run:
        working-directory: products/ai-fluency/apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5014
    steps:
      - uses: actions/checkout@v4

      - name: Check if web app exists
        id: check
        run: |
          if [ -f "products/ai-fluency/apps/web/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Web app not found on this branch — skipping"
          fi
        working-directory: .

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run tests with coverage
        if: steps.check.outputs.exists == 'true'
        run: pnpm test -- --coverage

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: pnpm run build

      - name: Upload coverage report
        if: always() && steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: products/ai-fluency/apps/web/coverage/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - products/ai-fluency/apps/api
          - products/ai-fluency/apps/web
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if app exists
        id: check
        run: |
          if [ -f "${{ matrix.app }}/package.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::App at ${{ matrix.app }} not found — skipping security audit"
          fi
        working-directory: .

      - name: Setup pnpm
        if: steps.check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run security audit
        if: steps.check.outputs.exists == 'true'
        run: pnpm audit --audit-level=critical --prod

  build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          # Use docker buildx build directly so the build context is unambiguously
          # the workspace root (.), making pnpm-lock.yaml accessible to the Dockerfiles.
          # docker compose resolves context: ../.. differently depending on invocation
          # directory; docker buildx build with explicit '.' avoids that ambiguity.

          BUILT=0

          if [ -f "products/ai-fluency/apps/api/Dockerfile" ]; then
            echo "Building api..."
            docker buildx build \
              --target production \
              --file products/ai-fluency/apps/api/Dockerfile \
              --tag ai-fluency-api:ci \
              .
            BUILT=$((BUILT+1))
          fi

          if [ -f "products/ai-fluency/apps/web/Dockerfile" ]; then
            echo "Building web..."
            docker buildx build \
              --target production \
              --file products/ai-fluency/apps/web/Dockerfile \
              --tag ai-fluency-web:ci \
              .
            BUILT=$((BUILT+1))
          fi

          if [ "$BUILT" -eq 0 ]; then
            echo "::notice::No Dockerfiles found — skipping Docker build"
          fi

  quality-gate:
    name: Quality Gate
    needs: [lint-and-typecheck, test-api, test-web, security, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Run traceability gate
        run: |
          if [ -f ".claude/scripts/traceability-gate.sh" ]; then
            chmod +x .claude/scripts/traceability-gate.sh
            .claude/scripts/traceability-gate.sh ai-fluency || true
          fi
        continue-on-error: true

      - name: Verify all jobs succeeded
        run: |
          echo "Job results:"
          echo "  lint-and-typecheck: ${{ needs.lint-and-typecheck.result }}"
          echo "  test-api:           ${{ needs.test-api.result }}"
          echo "  test-web:           ${{ needs.test-web.result }}"
          echo "  security:           ${{ needs.security.result }}"
          echo "  build:              ${{ needs.build.result }}"

          FAILED=false

          for job_result in \
            "${{ needs.lint-and-typecheck.result }}" \
            "${{ needs.test-api.result }}" \
            "${{ needs.test-web.result }}" \
            "${{ needs.security.result }}" \
            "${{ needs.build.result }}"; do
            if [ "$job_result" != "success" ] && [ "$job_result" != "skipped" ]; then
              FAILED=true
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo "Quality gate FAILED: one or more core jobs did not succeed"
            exit 1
          fi

          echo "All quality gates passed for AI Fluency (lint + tests + security + build)"
