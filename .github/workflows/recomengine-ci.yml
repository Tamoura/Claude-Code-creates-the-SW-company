name: RecomEngine CI

on:
  pull_request:
    paths:
      - 'products/recomengine/**'
      - '.github/workflows/recomengine-ci.yml'
  push:
    branches: [main]
    paths:
      - 'products/recomengine/**'

env:
  NODE_VERSION: '20'

jobs:
  lint-api:
    name: API - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/recomengine/apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run lint
        run: pnpm run --if-present lint

      - name: Run typecheck
        run: pnpm exec tsc --noEmit --pretty

  lint-web:
    name: Web - Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/recomengine/apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run --if-present lint

      - name: Run typecheck
        run: pnpm exec tsc --noEmit --pretty

  test-api:
    name: API - Tests
    runs-on: ubuntu-latest
    needs: lint-api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: recomengine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: products/recomengine/apps/api
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/recomengine_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-for-ci
      API_KEY_HMAC_SECRET: test-hmac-secret-for-ci
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run Prisma migrations
        run: pnpm exec prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Run tests with coverage
        run: pnpm test --coverage

  test-web:
    name: Web - Tests
    runs-on: ubuntu-latest
    needs: lint-web
    defaults:
      run:
        working-directory: products/recomengine/apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run --if-present test

  test-sdk:
    name: SDK - Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/recomengine/apps/sdk
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run --if-present lint

      - name: Run tests
        run: pnpm run --if-present test

      - name: Run build
        run: pnpm run --if-present build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - products/recomengine/apps/api
          - products/recomengine/apps/web
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --prod

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: products/recomengine/apps/api
            dockerfile: products/recomengine/apps/api/Dockerfile
          - name: web
            context: products/recomengine/apps/web
            dockerfile: products/recomengine/apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: recomengine-${{ matrix.name }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check for E2E tests
        run: |
          if [ -d "products/recomengine/e2e" ] || [ -d "products/recomengine/apps/web/e2e" ]; then
            echo "E2E directory found -- running Playwright tests"
            cd products/recomengine && npx playwright test --reporter=github 2>/dev/null || \
            (cd apps/web && npx playwright test --reporter=github 2>/dev/null) || true
          else
            echo "::warning::No E2E tests found for recomengine. Add e2e/ directory with Playwright tests."
          fi

  quality-gate:
    name: Quality Gate
    needs: [lint-api, lint-web, test-api, test-web, test-sdk, security, docker-build, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Run traceability gate
        run: |
          chmod +x .claude/scripts/traceability-gate.sh
          .claude/scripts/traceability-gate.sh recomengine || true
        continue-on-error: true

      - name: Verify all jobs succeeded
        run: |
          echo "Job results:"
          echo "  lint-api:      ${{ needs.lint-api.result }}"
          echo "  lint-web:      ${{ needs.lint-web.result }}"
          echo "  test-api:      ${{ needs.test-api.result }}"
          echo "  test-web:      ${{ needs.test-web.result }}"
          echo "  test-sdk:      ${{ needs.test-sdk.result }}"
          echo "  security:      ${{ needs.security.result }}"
          echo "  docker-build:  ${{ needs.docker-build.result }}"
          echo "  e2e:           ${{ needs.e2e.result }}"

          # Core jobs must pass
          if [ "${{ needs.lint-api.result }}" != "success" ] || \
             [ "${{ needs.lint-web.result }}" != "success" ] || \
             [ "${{ needs.test-api.result }}" != "success" ] || \
             [ "${{ needs.test-web.result }}" != "success" ] || \
             [ "${{ needs.test-sdk.result }}" != "success" ]; then
            echo "::error::Quality gate FAILED: one or more core jobs did not succeed"
            exit 1
          fi

          # Security audit must pass
          if [ "${{ needs.security.result }}" != "success" ] && \
             [ "${{ needs.security.result }}" != "skipped" ]; then
            echo "::error::Security gate FAILED - fix vulnerabilities before merging"
            exit 1
          fi

          # Docker builds must pass
          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "::error::Docker build validation FAILED - fix Dockerfiles before merging"
            exit 1
          fi

          echo "All quality gates passed for RecomEngine"
